name: MagFormer - Target Training CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  target-training:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchaudio soundfile

      - name: Run Performance Verification (Tiny)
        run: |
          python verify_performance.py --config tiny

      - name: Run Performance Verification (Medium)
        run: |
          python verify_performance.py --config medium

      - name: Generate coverage report
        run: |
          python -m pytest --cov=demo.py --cov-report=xml || echo "pytest not configured yet"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magformer-results
          path: |
            *.png
            *.csv
          retention-days: 7
